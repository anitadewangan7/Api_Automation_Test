[pytest]
# Automatically add these flags to every 'pytest' command run
addopts = 
    --html=report.html 
    --self-contained-html 
    --verbosity=1
    --tb=short

# File, class, and function naming conventions
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Configure console logging output
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Ignore or handle specific warning patterns across the test suite
filterwarnings =
    ignore::DeprecationWarning
    error::UserWarning

# Define the folder pytest should search for tests
testpaths = tests

# Optional: Define markers to categorize your tests
markers =
    smoke: Quick tests for critical features
    regression: Full test suite